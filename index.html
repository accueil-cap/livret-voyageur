<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livret Voyageurs</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">

    <div class="header">
      <h1>☀️ Livret Voyageurs</h1>
      <p>Bienvenue au Cap d'Agde</p>
      <p>Sélectionnez votre logement</p>
    </div>

    <!-- COLISÉE -->
    <div class="card">
      <h2>🏠 Appartement Colisée</h2>

      <p>
        Accédez aux informations relatives à votre séjour :
      </p>

      <button class="btn" onclick="accesColisee()">
  Entrer
</button>

    <!-- PALM BEACH -->
    <div class="card">
      <h2>🌴 Appartement Palm Beach</h2>

      <p>
        Accédez aux informations relatives à votre séjour :
      </p>

      <button class="btn" onclick="accesPalmBeach()">
  Entrer
</button>
    </div>

  </div>

    <script>
function accesColisee() {
    const code = prompt("Entrez votre code d'accès");

    if (code === "2510") {
        window.location.href = "colisee/colisee.html";
    } else {
        alert("Code incorrect");
    }
}

function accesPalmBeach() {
    const code = prompt("Entrez votre code d'accès");

    if (code === "4837") {
        window.location.href = "palm-beach/palm-beach.html";
    } else {
        alert("Code incorrect");
    }
}
</script>
    
</body>
</html>
