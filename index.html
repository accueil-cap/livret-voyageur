<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livret Voyageurs</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- TOP BAR LANGUE -->
  <div class="topbar">
    <div class="topbar-inner">
      <a href="#" onclick="setLang('fr')">🇫🇷 FR</a>
      <a href="#" onclick="setLang('en')">🇬🇧 EN</a>
      <a href="#" onclick="setLang('es')">🇪🇸 ES</a>
    </div>
  </div>

  <div class="container">

    <div class="header">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </div>

    <!-- COLISÉE -->
    <div class="card">
      <h2>🏠 <span id="colisee-title"></span></h2>
      <p id="colisee-text"></p>
      <button class="btn" onclick="openPin('colisee')" id="btn-colisee"></button>
    </div>

    <!-- PALM BEACH -->
    <div class="card">
      <h2>🌴 <span id="palm-title"></span></h2>
      <p id="palm-text"></p>
      <button class="btn" onclick="openPin('palm')" id="btn-palm"></button>
    </div>

  </div>

  <!-- =========================
       PIN MODAL
  ========================= -->
  <div id="pinOverlay" class="pin-overlay hidden">

    <div class="pin-box">

      <h2 id="pinTitle">Code d'accès</h2>
      <p id="pinSubtitle">Entrez votre code à 4 chiffres</p>

      <div class="pin-inputs">
        <input maxlength="1" class="pin" />
        <input maxlength="1" class="pin" />
        <input maxlength="1" class="pin" />
        <input maxlength="1" class="pin" />
      </div>

      <button class="btn" onclick="validatePin()">Valider</button>
      <button class="btn secondary" onclick="closePin()">Annuler</button>

    </div>

  </div>

  <!-- =========================
       SCRIPT GLOBAL
  ========================= -->
  <script>
    let lang = localStorage.getItem("lang") || "fr";

    let currentApp = null;

    const t = {
      fr: {
        title: "Livret voyageurs",
        subtitle: "Choisissez votre appartement",
        colisee: "Appartement Colisée",
        palm: "Appartement Palm Beach",
        text: "Accédez aux informations relatives à votre séjour",
        enter: "Entrer"
        pinTitle: "Code d'accès",
        pinSubtitle: "Entrez votre code à 4 chiffres",
      },
      en: {
        title: "Guest Guide",
        subtitle: "Choose your apartment",
        colisee: "Colisée Apartment",
        palm: "Palm Beach Apartment",
        text: "Access your stay information",
        enter: "Enter"
        pinTitle: "Access code",
        pinSubtitle: "Enter your 4-digit code",
      },
      es: {
        title: "Guía del viajero",
        subtitle: "Elige tu apartamento",
        colisee: "Apartamento Colisée",
        palm: "Apartamento Palm Beach",
        text: "Accede a la información de tu estancia",
        enter: "Entrar"
        pinTitle: "Código de acceso",
        pinSubtitle: "Introduce tu código de 4 dígitos",
      }
    };

    function setLang(l){
      lang = l;
      localStorage.setItem("lang", l);
      render();
    }

    function render(){
      const d = t[lang];

      document.getElementById("title").innerText = d.title;
      document.getElementById("subtitle").innerText = d.subtitle;

      document.getElementById("colisee-title").innerText = d.colisee;
      document.getElementById("palm-title").innerText = d.palm;

      document.getElementById("colisee-text").innerText = d.text;
      document.getElementById("palm-text").innerText = d.text;

      document.getElementById("btn-colisee").innerText = d.enter;
      document.getElementById("btn-palm").innerText = d.enter;

      document.getElementById("pinTitle").innerText = d.pinTitle;
      document.getElementById("pinSubtitle").innerText = d.pinSubtitle;
    }

    render();

    // =========================
    // PIN SYSTEM
    // =========================

function openPin(app){
  currentApp = app;

  const overlay = document.getElementById("pinOverlay");
  overlay.classList.remove("hidden");

  const inputs = document.querySelectorAll(".pin");

  inputs.forEach(i => i.value = "");
  inputs[0].focus();

  inputs.forEach((input, index) => {
    input.oninput = () => {
      if(input.value && index < 3){
        inputs[index + 1].focus();
      }
    };
  });
}

    function validatePin(){
      const inputs = document.querySelectorAll(".pin");
      let code = "";

      inputs.forEach(i => code += i.value);

      let valid = false;

      if(currentApp === "colisee" && code === "2510"){
        valid = "colisee/colisee.html";
      }

      if(currentApp === "palm" && code === "4837"){
        valid = "palm-beach/palm-beach.html";
      }

      if(valid){
        window.location.href = valid;
      } else {
        alert(
          lang === "fr" ? "Code incorrect" :
          lang === "en" ? "Wrong code" :
          "Código incorrecto"
        );

        inputs.forEach(i => i.value = "");
        inputs[0].focus();
      }
    }

    function closePin(){
      document.getElementById("pinOverlay").classList.add("hidden");
    }

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape") closePin();
    });

  </script>

</body>
</html>
