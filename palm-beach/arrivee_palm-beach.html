<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Palm Beach - Arrivée</title>
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="app_palm-beach.js"></script>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1 id="title"></h1>
      <p id="subtitle"></p>

      <!-- LANGUES -->
      <div class="lang-switch">
        <button onclick="setLang('fr')">🇫🇷 FR</button>
        <button onclick="setLang('en')">🇬🇧 EN</button>
        <button onclick="setLang('es')">🇪🇸 ES</button>
      </div>
    </div>

    <!-- MENU -->
    <div class="card" id="menu"></div>

    <!-- SECTIONS -->
    <div class="card" id="heure"></div>
    <div class="card" id="adresse"></div>
    <div class="card" id="photos1"></div>
    <div class="card" id="codes"></div>
    <div class="card" id="taxis"></div>
    <div class="card" id="logement"></div>
    <div class="card" id="photos2"></div>
    <div class="card" id="livret"></div>

  </div>

</body>
</html>
